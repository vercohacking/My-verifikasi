<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AUTH SERVER - OFFSET LOCK</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Courier New', Courier, monospace; }
        body { background: #05000a; height: 100vh; display: flex; justify-content: center; align-items: center; color: #fff; overflow: hidden; }
        .card { background: rgba(10, 0, 20, 0.95); padding: 40px; border-radius: 10px; border: 1px solid #bc13fe; width: 90%; max-width: 400px; text-align: center; box-shadow: 0 0 20px #bc13fe; }
        h2 { color: #bc13fe; text-transform: uppercase; letter-spacing: 3px; margin-bottom: 25px; }
        input { width: 100%; padding: 12px; background: transparent; border: 1px solid #bc13fe; border-radius: 5px; color: #fff; text-align: center; margin-bottom: 20px; outline: none; }
        button { width: 100%; padding: 12px; background: #bc13fe; border: none; border-radius: 5px; color: white; font-weight: bold; cursor: pointer; text-transform: uppercase; }
        #status { margin-top: 20px; font-size: 12px; color: #bc13fe; font-weight: bold; }
    </style>
</head>
<body>

    <div class="card">
        <h2>OFFSET SERVER</h2>
        <input type="text" id="userId" placeholder="MASUKKAN ID" autocomplete="off">
        <button onclick="startAuth()">VERIFIKASI ID</button>
        <p id="status">STATUS: STANDBY</p>
    </div>

    <script>
        // SATU SERVER URL
        const serverURL = "https://myauthsystem-55ca0-default-rtdb.firebaseio.com/Requests/";

        async function startAuth() {
            const id = document.getElementById('userId').value.trim();
            const statusText = document.getElementById('status');
            if (id === "") return alert("ID Wajib Diisi!");

            statusText.innerText = "STATUS: MENGHUBUNGKAN...";

            try {
                // MENGGUNAKAN PATCH (Lebih aman dari 405 error)
                await fetch(serverURL + id + ".json", {
                    method: "PATCH",
                    body: JSON.stringify({ 
                        status: "pending", 
                        offset: "HEAD_LOCK_0x7FF",
                        server_source: "index_access"
                    })
                });

                statusText.innerText = "STATUS: MENUNGGU PERSETUJUAN...";

                // Cek status tiap 3 detik
                const interval = setInterval(async () => {
                    const check = await fetch(serverURL + id + ".json");
                    const data = await check.json();

                    if (data && data.status === "approved") {
                        clearInterval(interval);
                        statusText.innerText = "STATUS: OFFSET ACTIVE!";
                        statusText.style.color = "#00ff00";
                        alert("VERIFIKASI SUKSES! Offset Head Lock Aktif.");
                    }
                }, 3000);

            } catch (e) {
                statusText.innerText = "STATUS: SERVER ERROR!";
                alert("Masalah Jaringan/Server!");
            }
        }
    </script>
</body>
</html>
