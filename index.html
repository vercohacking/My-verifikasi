<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>FF LOGIN SYSTEM - OFFSET AUTH</title>
    <style>
        body { background: #05000a; color: #fff; font-family: monospace; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { border: 2px solid #ff0055; padding: 40px; text-align: center; box-shadow: 0 0 25px #ff0055; border-radius: 15px; width: 350px; }
        h2 { color: #ff0055; text-transform: uppercase; letter-spacing: 2px; }
        input { width: 100%; padding: 12px; margin-top: 20px; background: rgba(255,255,255,0.05); border: 1px solid #ff0055; color: white; text-align: center; outline: none; }
        button { width: 100%; padding: 12px; margin-top: 15px; background: #ff0055; border: none; color: white; cursor: pointer; font-weight: bold; text-transform: uppercase; }
        #status { margin-top: 20px; font-size: 11px; font-weight: bold; color: #ff0055; }
    </style>
</head>
<body>

    <div class="card">
        <h2>FF LOGIN AUTH</h2>
        <p style="font-size: 9px; opacity: 0.6;">SYNCED WITH LOCALCONFIG.JSON</p>
        <input type="text" id="userID" placeholder="ENTER PLAYER ID">
        <button onclick="startProcess()">LOGIN FREE FIRE</button>
        <div id="status">SERVER READY</div>
    </div>

    <script>
        async function startProcess() {
            const id = document.getElementById('userID').value.trim();
            const log = document.getElementById('status');
            if(!id) return alert("ID Needed!");

            log.innerText = "READING LOCALCONFIG...";

            try {
                // 1. Ambil URL Server dari file JSON lokal di GitHub
                const configRes = await fetch('localconfig.json');
                const config = await configRes.json();
                const SERVER_URL = config.auth_config.server_url;

                log.innerText = "CONNECTING TO SERVER...";

                // 2. Kirim Request ke Firebase (ServerURL)
                await fetch(SERVER_URL + id + ".json", {
                    method: "PATCH",
                    body: JSON.stringify({ 
                        status: "pending", 
                        module: config.auth_config.system_mode,
                        login_time: new Date().toISOString()
                    })
                });

                log.innerText = "WAITING FOR ADMIN APPROVAL...";

                // 3. Cek Izin Secara Real-time
                const check = setInterval(async () => {
                    const res = await fetch(SERVER_URL + id + ".json");
                    const data = await res.json();

                    if(data && data.status === "approved") {
                        clearInterval(check);
                        
                        log.innerText = "ACCESS GRANTED! REDIRECTING TO GAME...";
                        log.style.color = "#00ff00";
                        document.querySelector('.card').style.borderColor = "#00ff00";
                        document.querySelector('.card').style.boxShadow = "0 0 35px #00ff00";

                        setTimeout(() => {
                            alert("BERHASIL! Offset Head Lock Aktif. Membuka akses Login Free Fire...");
                            // Di sini sistem bisa diarahkan untuk membuka protokol game atau token
                        }, 1500);
                    }
                }, 3000);

            } catch (e) {
                log.innerText = "ERROR: FAILED TO SYNC SERVERURL!";
                console.error(e);
            }
        }
    </script>
</body>
</html>
