<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verifikasi Modern</title>
    <style>
        /* Desain Background & Dasar */
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: radial-gradient(circle, #2e0249 0%, #000000 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
        }

        /* Container Utama */
        .glass-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 40px;
            width: 350px;
            text-align: center;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.8);
        }

        h2 {
            margin-bottom: 20px;
            font-size: 1.5rem;
            text-shadow: 0 0 10px #a910f0;
        }

        /* Tombol Modern */
        .btn {
            background: transparent;
            border: 2px solid #a910f0;
            color: white;
            padding: 12px 25px;
            font-size: 16px;
            border-radius: 50px;
            cursor: pointer;
            transition: 0.3s;
            width: 100%;
            margin-bottom: 10px;
            font-weight: bold;
            text-transform: uppercase;
        }

        .btn:hover {
            background: #a910f0;
            box-shadow: 0 0 20px #a910f0;
        }

        /* Status & Timer */
        #status-text {
            font-size: 14px;
            margin: 15px 0;
            color: #d1d1d1;
        }

        /* Bagian Key (Hidden di awal) */
        .key-section {
            display: none;
            margin-top: 20px;
            text-align: left;
        }

        .key-box {
            background: rgba(0, 0, 0, 0.3);
            padding: 10px;
            border-radius: 10px;
            margin-bottom: 15px;
            border-left: 4px solid #a910f0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .copy-btn {
            background: #a910f0;
            border: none;
            color: white;
            padding: 5px 10px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 12px;
        }

        .hidden { display: none; }
    </style>
</head>
<body>

<div class="glass-card" id="main-card">
    <div id="step-1">
        <h2>Lakukan Verifikasi</h2>
        <button class="btn" onclick="startVerification()">VERIFIKASI</button>
    </div>

    <div id="step-2" class="hidden">
        <h2>Join Channel</h2>
        <button class="btn" onclick="startJoinTask('https://t.me/yourchannel')">JOIN SALURAN CHANNEL</button>
        <button class="btn" onclick="startJoinTask('https://tiktok.com/@youraccount')">JOIN TIKTOK CHANNEL</button>
    </div>

    <p id="status-text"></p>

    <div id="key-container" class="key-section">
        <p><strong>Key Indo</strong></p>
        <div class="key-box">
            <span id="key1">indonesia_key3030</span>
            <button class="copy-btn" onclick="copyText('key1')">COPY</button>
        </div>

        <p><strong>Key India</strong></p>
        <div class="key-box">
            <span id="key2">india_key3035</span>
            <button class="copy-btn" onclick="copyText('key2')">COPY</button>
        </div>
    </div>
</div>

<script>
    const statusText = document.getElementById('status-text');
    const step1 = document.getElementById('step-1');
    const step2 = document.getElementById('step-2');
    const keyContainer = document.getElementById('key-container');

    // Tahap 1: Verifikasi 3 Detik
    function startVerification() {
        step1.classList.add('hidden');
        let timeLeft = 3;
        
        const countdown = setInterval(() => {
            statusText.innerText = `Menunggu verifikasi... ${timeLeft} detik`;
            timeLeft--;
            
            if (timeLeft < 0) {
                clearInterval(countdown);
                statusText.innerText = "";
                step2.classList.remove('hidden');
            }
        }, 1000);
    }

    // Tahap 2: Join Task 30 Detik
    function startJoinTask(url) {
        window.open(url, '_blank'); // Buka link
        let timeLeft = 30;
        
        const countdown = setInterval(() => {
            statusText.innerText = `Harap tunggu... ${timeLeft} detik`;
            timeLeft--;
            
            if (timeLeft < 0) {
                clearInterval(countdown);
                statusText.innerText = "Selesai!";
                step2.classList.add('hidden');
                keyContainer.style.display = 'block';
            }
        }, 1000);
    }

    // Fungsi Salin (Copy)
    function copyText(id) {
        const text = document.getElementById(id).innerText;
        navigator.clipboard.writeText(text).then(() => {
            alert("Key berhasil disalin: " + text);
        });
    }
</script>

</body>
</html>
