<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FF ACCOUNT AUTH - VERCOPAPI</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Courier New', Courier, monospace; }
        body { background: #05000a; height: 100vh; display: flex; justify-content: center; align-items: center; color: #fff; }
        .login-box {
            background: rgba(10, 0, 20, 0.98); padding: 40px; border-radius: 12px;
            border: 2px solid #ff0055; width: 90%; max-width: 380px; text-align: center;
            box-shadow: 0 0 20px #ff0055;
        }
        h2 { color: #ff0055; text-transform: uppercase; letter-spacing: 3px; margin-bottom: 20px; }
        input {
            width: 100%; padding: 12px; background: transparent;
            border: 1px solid #ff0055; border-radius: 5px; color: #fff;
            text-align: center; font-size: 16px; margin-bottom: 20px; outline: none;
        }
        button {
            width: 100%; padding: 12px; background: #ff0055;
            border: none; border-radius: 5px; color: white; font-weight: bold;
            cursor: pointer; text-transform: uppercase; transition: 0.3s;
        }
        button:hover { background: #fff; color: #ff0055; box-shadow: 0 0 20px #fff; }
        
        #display-msg {
            display: none; margin-top: 20px; padding: 10px;
            border: 1px dashed #ff0055; color: #ff0055;
            font-size: 13px; font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="login-box">
        <h2>LOGIN SYSTEM</h2>
        <p style="font-size: 10px; margin-bottom: 20px; opacity: 0.6;">VERIFY YOUR ACCOUNT ID</p>
        
        <input type="text" id="myId" placeholder="MASUKKAN ID FF">
        <button onclick="checkAccess()">LOGIN ACCOUNT</button>
        
        <div id="display-msg"></div>
    </div>

    <script>
        async function checkAccess() {
            const inputId = document.getElementById('myId').value.trim();
            const msgBox = document.getElementById('display-msg');
            
            if (!inputId) return alert("ID Tidak Boleh Kosong!");

            msgBox.style.display = "block";
            msgBox.innerText = "Connecting to Server...";

            try {
                // 1. Ambil Kontrol dari localconfig.json
                const response = await fetch('localconfig.json');
                const config = await response.json();
                
                const SERVER_URL = config.admin_control.server_url;
                const BLOCK_MSG = config.admin_control.login_block_message;

                // 2. Cek status ID di Firebase Admin Control
                const dbResponse = await fetch(SERVER_URL + inputId + ".json");
                const userData = await dbResponse.json();

                if (!userData) {
                    // Jika ID belum terdaftar, kirim data baru ke Admin
                    await fetch(SERVER_URL + inputId + ".json", {
                        method: "PATCH",
                        body: JSON.stringify({ 
                            status: "pending", 
                            requested_at: new Date().toLocaleString(),
                            feature: config.admin_control.target_feature
                        })
                    });
                    msgBox.innerText = BLOCK_MSG; // "My Account id Verifikasi!"
                } 
                else if (userData.status === "pending") {
                    // Jika status masih pending (belum di-approve Admin)
                    msgBox.innerText = BLOCK_MSG;
                } 
                else if (userData.status === "approved") {
                    // Jika sudah disetujui Admin
                    msgBox.style.color = "#00ff00";
                    msgBox.style.borderColor = "#00ff00";
                    msgBox.innerText = "ACCESS GRANTED! LOADING FF OFFSET...";
                    
                    setTimeout(() => {
                        alert("Verifikasi Berhasil! Head Lock Offset Aktif.");
                    }, 1500);
                }

            } catch (error) {
                msgBox.innerText = "Error: Gagal terhubung ke Server!";
            }
        }
    </script>
</body>
</html>
