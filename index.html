<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FF ACCOUNT VERIFICATION</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { 
            background: #0a0a0a; color: white; height: 100vh; 
            display: flex; justify-content: center; align-items: center;
        }
        .container {
            width: 350px; padding: 30px; background: #151515;
            border-radius: 15px; border: 1px solid #ff0055;
            text-align: center; box-shadow: 0 0 20px rgba(255, 0, 85, 0.3);
        }
        h2 { color: #ff0055; margin-bottom: 20px; letter-spacing: 2px; }
        input {
            width: 100%; padding: 12px; margin-bottom: 15px;
            background: #222; border: 1px solid #444; color: white;
            border-radius: 8px; text-align: center; outline: none;
        }
        input:focus { border-color: #ff0055; }
        .btn-login {
            width: 100%; padding: 12px; background: #ff0055;
            border: none; color: white; font-weight: bold;
            border-radius: 8px; cursor: pointer; transition: 0.3s;
        }
        .btn-login:hover { background: #ff3377; box-shadow: 0 0 15px #ff0055; }
        
        /* Pesan Error / Peringatan */
        #alert-box {
            display: none; margin-top: 20px; padding: 10px;
            background: rgba(255, 0, 85, 0.1);
            border: 1px solid #ff0055; border-radius: 5px;
            color: #ff0055; font-weight: bold; font-size: 14px;
        }
    </style>
</head>
<body>

    <div class="container">
        <h2>FF AUTH</h2>
        <p style="font-size: 11px; color: #888; margin-bottom: 20px;">VERIFY YOUR FREE FIRE ID</p>
        
        <input type="text" id="playerID" placeholder="Masukkan Player ID">
        <button class="btn-login" onclick="handleLogin()">LOGIN ACCOUNT</button>
        
        <div id="alert-box"></div>
    </div>

    <script>
        async function handleLogin() {
            const id = document.getElementById('playerID').value.trim();
            const alertBox = document.getElementById('alert-box');
            
            if(!id) return alert("Silakan masukkan ID!");

            alertBox.style.display = "block";
            alertBox.innerText = "Mengecek Akun...";
            alertBox.style.color = "#ff0055";

            try {
                // 1. Ambil pesan error dari localconfig.json
                const configRes = await fetch('localconfig.json');
                const config = await configRes.json();
                const ERROR_MSG = config.server_config.error_message;
                const DB_URL = config.server_config.server_url;

                // 2. Cek status di Firebase
                const res = await fetch(DB_URL + id + ".json");
                const userData = await res.json();

                // Jika data belum ada, buat data baru (status pending)
                if (!userData) {
                    await fetch(DB_URL + id + ".json", {
                        method: "PATCH",
                        body: JSON.stringify({ status: "pending", created: new Date().toLocaleString() })
                    });
                    alertBox.innerText = ERROR_MSG; // "My Account id Verifikasi!"
                } 
                // Jika status masih pending
                else if (userData.status === "pending") {
                    alertBox.innerText = ERROR_MSG; // Muncul tulisan yang kamu minta
                } 
                // Jika sudah di-approve oleh admin
                else if (userData.status === "approved") {
                    alertBox.innerText = "LOGIN BERHASIL! MEMBUKA GAME...";
                    alertBox.style.color = "#00ff00";
                    alertBox.style.borderColor = "#00ff00";
                    
                    setTimeout(() => {
                        alert("Akses ID Diterima! Offset Head Lock Aktif.");
                        // Masukkan perintah buka game di sini
                    }, 1500);
                }

            } catch (err) {
                alertBox.innerText = "Gagal terhubung ke server!";
            }
        }
    </script>
</body>
</html>
