<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verifikasi Modern - Papi Verco</title>
    <style>
        /* Desain Latar Belakang Ungu Gelap */
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', sans-serif;
            background: #0d0115; 
            background: radial-gradient(circle, #2e0249 0%, #0d0115 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            overflow: hidden;
        }

        /* Container Glassmorphism */
        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 25px;
            padding: 40px 30px;
            width: 350px;
            text-align: center;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.6);
        }

        h2 {
            font-size: 1.5rem;
            margin-bottom: 25px;
            text-shadow: 0 0 10px #a910f0; /* Tulisan putih pinggir ungu */
        }

        /* Tombol Modern */
        .btn {
            background: transparent;
            border: 2px solid #a910f0;
            color: white;
            padding: 14px 20px;
            font-size: 14px;
            border-radius: 12px;
            cursor: pointer;
            transition: 0.3s;
            width: 100%;
            margin-bottom: 15px;
            font-weight: bold;
            text-transform: uppercase;
        }

        .btn:hover:not(:disabled) {
            background: #a910f0;
            box-shadow: 0 0 20px #a910f0;
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            border-color: #555;
        }

        /* Timer Styling */
        .timer-text {
            font-size: 24px;
            color: #ff00ff;
            font-weight: bold;
            margin: 10px 0;
            text-shadow: 0 0 10px #ff00ff;
        }

        /* Section Key */
        .key-section {
            display: none;
            margin-top: 20px;
            text-align: left;
            animation: fadeIn 1s;
        }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .key-box {
            background: rgba(0, 0, 0, 0.5);
            padding: 12px;
            border-radius: 10px;
            margin-bottom: 10px;
            border-left: 5px solid #a910f0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .copy-btn {
            background: #a910f0;
            border: none;
            color: white;
            padding: 5px 10px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 12px;
        }

        .hidden { display: none; }
    </style>
</head>
<body>

<div class="glass-card">
    <div id="step-1">
        <h2>Lakukan Verifikasi</h2>
        <button class="btn" id="v-btn" onclick="startV()">Verifikasi</button>
    </div>

    <div id="step-2" class="hidden">
        <h2>Join Channel</h2>
        <button class="btn" id="wa-btn" onclick="openLink('wa')">Join Saluran Channel</button>
        <button class="btn" id="tt-btn" onclick="openLink('tt')">Join Tiktok Channel</button>
    </div>

    <div id="timer-box" class="hidden">
        <div class="timer-text" id="seconds">30</div>
        <p>Mohon tunggu sebentar...</p>
    </div>

    <div id="key-container" class="key-section">
        <p><strong>Key Indo</strong></p>
        <div class="key-box">
            <span id="k1">indonesia_key3030</span>
            <button class="copy-btn" onclick="copy('k1')">COPY</button>
        </div>

        <p><strong>Key India</strong></p>
        <div class="key-box">
            <span id="k2">india_key3035</span>
            <button class="copy-btn" onclick="copy('k2')">COPY</button>
        </div>
    </div>
</div>

<script>
    let waJoined = false;
    let ttJoined = false;
    let isRunning = false;

    // Fungsi Verifikasi Awal
    function startV() {
        let btn = document.getElementById('v-btn');
        btn.disabled = true;
        let time = 3;
        let itv = setInterval(() => {
            btn.innerText = `Tunggu ${time}s`;
            time--;
            if(time < 0) {
                clearInterval(itv);
                document.getElementById('step-1').classList.add('hidden');
                document.getElementById('step-2').classList.remove('hidden');
            }
        }, 1000);
    }

    // Fungsi Klik Link & Timer 30 Detik
    function openLink(type) {
        if(isRunning) return;

        let url = (type === 'wa') 
            ? "https://whatsapp.com/channel/0029Vb7BMKU6mYPSsNzTWs45" 
            : "https://www.tiktok.com/@papiverco";
        
        window.open(url, '_blank');
        
        isRunning = true;
        document.getElementById('timer-box').classList.remove('hidden');
        let time = 30;
        let display = document.getElementById('seconds');
        
        let itv = setInterval(() => {
            display.innerText = time;
            time--;
            if(time < 0) {
                clearInterval(itv);
                isRunning = false;
                document.getElementById('timer-box').classList.add('hidden');
                
                if(type === 'wa') {
                    waJoined = true;
                    document.getElementById('wa-btn').innerText = "WA TERVERIFIKASI ✅";
                    document.getElementById('wa-btn').disabled = true;
                } else {
                    ttJoined = true;
                    document.getElementById('tt-btn').innerText = "TIKTOK TERVERIFIKASI ✅";
                    document.getElementById('tt-btn').disabled = true;
                }
                
                // Jika sudah dua-duanya
                if(waJoined && ttJoined) {
                    document.getElementById('step-2').classList.add('hidden');
                    document.getElementById('key-container').style.display = 'block';
                }
            }
        }, 1000);
    }

    function copy(id) {
        let txt = document.getElementById(id).innerText;
        navigator.clipboard.writeText(txt).then(() => alert("Disalin: " + txt));
    }
</script>

</body>
</html>
